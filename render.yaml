services:
  - type: web
    name: nlp-uk-clinical-portal
    runtime: docker
    dockerfilePath: ./Dockerfile.portal
    plan: free
    envVars:
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false        # set manually in Render dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false        # set manually in Render dashboard
    healthCheckPath: /health
    autoDeploy: true
